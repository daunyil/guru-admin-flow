# CI — Quality gate untuk setiap PR dan push
#
# Trigger:
#   - Push ke main atau branch sprint-*
#   - Pull request ke main
#
# Jobs (parallel):
#   1. typecheck  — TypeScript strict check di 3 workspace
#   2. test       — Vitest run, 61+ test harus PASS
#   3. build      — vite build sukses + upload artifact
#   4. audit      — Security & scope check (no Supabase, no secrets, no dist)

name: CI

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (3 workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck all workspaces
        run: npm run typecheck

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run tests
        run: npm run test:run
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/*/test-results.xml
            apps/*/test-results.xml
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build teacher-admin app
        run: npx vite build
        working-directory: apps/teacher-admin
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: teacher-admin-dist
          path: apps/teacher-admin/dist/
          retention-days: 7

  audit:
    name: Audit (security & scope)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit 1 — Tidak ada Supabase dependency
        run: |
          echo "=== Cek Supabase di package.json mana pun ==="
          if grep -rni "supabase" --include="package.json" . \
             | grep -v node_modules \
             | grep -v package-lock.json \
             | grep -E '"@supabase|supabase-js|"supabase":'; then
            echo "FAIL: Ditemukan dependency Supabase"
            exit 1
          fi
          echo "PASS: Tidak ada dependency Supabase"

      - name: Audit 2 — Tidak ada import @supabase di kode
        run: |
          echo "=== Cek import @supabase di kode ==="
          if grep -rni "@supabase" \
             --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
             . | grep -v node_modules; then
            echo "FAIL: Ditemukan import @supabase di kode"
            exit 1
          fi
          echo "PASS: Tidak ada import @supabase"

      - name: Audit 3 — Tidak ada token/credential ter-commit
        run: |
          echo "=== Cek pattern credential berbahaya ==="
          if grep -rn "ghp_[A-Za-z0-9]\{36\}" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" . | grep -v node_modules; then
            echo "FAIL: Ditemukan GitHub PAT di kode/dokumen"
            exit 1
          fi
          if grep -rn "github_pat_[A-Za-z0-9_]\{82\}" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.md" . | grep -v node_modules; then
            echo "FAIL: Ditemukan GitHub fine-grained PAT di kode/dokumen"
            exit 1
          fi
          if grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" . | grep -v node_modules; then
            echo "FAIL: Ditemukan AWS access key"
            exit 1
          fi
          echo "PASS: Tidak ada token/credential ter-commit"

      - name: Audit 4 — Tidak ada dist/ atau node_modules/ ter-track
        run: |
          echo "=== Cek file build/dependency yang ter-track ==="
          TRACKED_BUILD=$(git ls-files | grep -E "^(dist/|node_modules/|apps/[^/]+/dist/|apps/[^/]+/node_modules/|packages/[^/]+/dist/|packages/[^/]+/node_modules/)" || true)
          if [ -n "$TRACKED_BUILD" ]; then
            echo "FAIL: Ditemukan file build/dependency ter-track:"
            echo "$TRACKED_BUILD"
            exit 1
          fi
          echo "PASS: Tidak ada dist/ atau node_modules/ ter-track"

      - name: Audit 5 — Tidak ada file .env ter-track
        run: |
          echo "=== Cek file .env ter-track ==="
          TRACKED_ENV=$(git ls-files | grep -E "^\.env" || true)
          if [ -n "$TRACKED_ENV" ]; then
            echo "FAIL: Ditemukan file .env ter-track:"
            echo "$TRACKED_ENV"
            exit 1
          fi
          echo "PASS: Tidak ada file .env ter-track"

      - name: Audit 6 — Backup schemaVersion konsisten
        run: |
          echo "=== Cek DATA_SCHEMA_VERSION ==="
          if ! grep -q "export const DATA_SCHEMA_VERSION = 2;" packages/shared/src/constants.ts; then
            echo "FAIL: DATA_SCHEMA_VERSION tidak ditemukan atau bukan 2"
            exit 1
          fi
          echo "PASS: DATA_SCHEMA_VERSION = 2 terverifikasi"

      - name: Audit 7 — Test files ada
        run: |
          echo "=== Cek test files ter-track ==="
          TEST_COUNT=$(git ls-files | grep -c "test/.*\.test\.ts$" || echo "0")
          if [ "$TEST_COUNT" -lt 7 ]; then
            echo "FAIL: Hanya $TEST_COUNT test files ter-track, seharusnya minimal 7"
            exit 1
          fi
          echo "PASS: $TEST_COUNT test files ter-track"

      - name: Audit summary
        run: |
          echo "AUDIT SELESAI — SEMUA CEK PASS"
